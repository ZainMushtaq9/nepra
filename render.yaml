services:
  - type: web
    name: nepra-bill-protection
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m flask db upgrade"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT 'nepra:app'"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_APP
        value: nepra.py
      - key: DATABASE_URL
        fromDatabase:
          name: nepra-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: nepra-db
    databaseName: nepra
    user: nepra_user
    plan: free
